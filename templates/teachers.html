<!DOCTYPE html>
<html>

<head>

<title>Faculty - Defence Technology</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
font-family:Arial;
background:#f4f6fa;
}

.header{
background:#1f2a40;
color:white;
text-align:center;
padding:25px;
}

.header h1{
margin:0;
}

.teachers-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
padding:40px;
}

.teacher-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
text-align:center;
transition:0.3s;
}

.teacher-card:hover{
transform:translateY(-5px);
}

.teacher-card img{
width:100px;
border-radius:50%;
margin-bottom:10px;
}

.teacher-card h3{
margin:5px 0;
}

.teacher-card p{
color:#555;
}

</style>

</head>

<body>

<div class="header">

<h1>Defence Technology Faculty</h1>

</div>

<div class="teachers-container">

<div class="teacher-card">
<img src="/static/images/faculty.png">
<h3>Dr. V. M. Phalle</h3>
<p>HOD</p>
</div>

<div class="teacher-card">
<img src="/static/images/faculty.png">
<h3>Dr. Kajal Vinayak</h3>
<p>Associate Professor</p>
</div>

<div class="teacher-card">
<img src="/static/images/faculty.png">
<h3>Dr. Sumit Patil</h3>
<p>Assistant Professor</p>
</div>

<div class="teacher-card">
<img src="/static/images/faculty.png">
<h3>Dr. R. K. Sharma</h3>
<p>Assistant Professor</p>
</div>

</div>

</body>

</html>
